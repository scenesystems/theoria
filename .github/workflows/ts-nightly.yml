name: TypeScript Nightly

on:
  workflow_dispatch:
  schedule:
    # Daily at noon UTC
    - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  types:
    name: Typecheck (TS nightly)
    if: github.repository_owner == 'scenesystems'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Install TypeScript nightly
        run: bun add --dev typescript@next

      - name: Typecheck with TS nightly
        run: bun run check:all

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `TypeScript nightly typecheck failure — ${new Date().toISOString().slice(0, 10)}`
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ts-nightly',
              per_page: 1
            })
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing as of ${new Date().toISOString()}.\n\n[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['ts-nightly'],
                body: `The daily typecheck against TypeScript nightly failed.\n\n[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nThis may indicate an upcoming breaking change in TypeScript that affects the codebase.`
              })
            }
