name: Release Queue

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changeset-check:
    name: Changeset status
    if: github.repository_owner == 'scenesystems'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Check for changesets
        id: changesets
        run: |
          # Count new changeset files vs main
          count=$(git diff --name-only origin/main...HEAD -- '.changeset/*.md' | { grep -v 'README.md' || true; } | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq "0" ]; then
            echo "status=missing" >> "$GITHUB_OUTPUT"
          else
            echo "status=present" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.changesets.outputs.status }}'
            const count = '${{ steps.changesets.outputs.count }}'
            const marker = '<!-- changeset-check -->'

            let body
            if (status === 'present') {
              body = `${marker}\n### ✅ Changeset found\n\nThis PR includes ${count} changeset(s). Version bumps will be applied when merged.`
            } else {
              body = `${marker}\n### ⚠️ No changeset found\n\nThis PR does not include a changeset. If this PR changes public API or behavior, add one:\n\n\`\`\`sh\nbun run changeset\n\`\`\`\n\nIf this is an internal change (docs, CI, refactor), you can ignore this.`
            }

            // Find and update existing comment, or create new
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            })
            const existing = comments.data.find(c => c.body.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              })
            }
